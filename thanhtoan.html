<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Thanh Toán</title>

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<!-- HEADER -->

<header class="header">

    <div class="logo">

        <img src="images/hinh5.png">

        <span>Luxury Jewelry</span>

    </div>

    <nav class="menu">

        <ul>

            <li><a href="index.html">Trang chủ</a></li>

            <li><a href="trangsuc.html">Trang sức</a></li>

            <li><a href="nhancuoi.html">Nhẫn cưới</a></li>

            <li><a href="quatang.html">Quà tặng</a></li>

            <li><a href="bosuutap.html">Bộ sưu tập</a></li>

            <li><a href="lienhe.html">Liên hệ</a></li>

        </ul>

    </nav>

</header>

<!-- FORM THANH TOÁN -->

<div class="form-box">

    <h2>THANH TOÁN</h2>

    <input 
    type="text"
    id="customer-name"
    placeholder="Nhập họ tên">

    <input 
    type="text"
    id="phone"
    placeholder="Nhập số điện thoại">

    <input 
    type="text"
    id="address"
    placeholder="Nhập địa chỉ">

    <select id="payment-method">

        <option value="">
            Chọn phương thức thanh toán
        </option>

        <option value="COD">
            Thanh toán khi nhận hàng
        </option>

        <option value="BANK">
            Chuyển khoản ngân hàng
        </option>

    </select>

    <!-- DANH SÁCH SẢN PHẨM -->

    <div id="payment-total">

        <div id="checkout-products"></div>

        <h2 id="checkout-total">
            Tổng: 0đ
        </h2>

    </div>

    <!-- BUTTON -->

    <div class="payment-actions">

        <button class="payment-btn"
        onclick="payNow()">

            Xác nhận thanh toán

        </button>

        <button class="close-btn"
        onclick="window.location.href='index.html'">

            Quay lại

        </button>

    </div>

</div>

<!-- SCRIPT -->

<script>

let cart =
JSON.parse(localStorage.getItem("checkoutCart")) || [];

let productsBox =
document.getElementById("checkout-products");

let total = 0;

/* HIỂN THỊ SẢN PHẨM */

if(cart.length > 0){

    cart.forEach(function(item){

        total += item.price * item.quantity;

        productsBox.innerHTML += `

        <div class="checkout-item">

            <div>

                <h3>${item.name}</h3>

                <p>
                    Số lượng: ${item.quantity}
                </p>

            </div>

            <div class="checkout-price">

                ${(item.price * item.quantity)
                .toLocaleString('vi-VN')}đ

            </div>

        </div>

        `;

    });

}

else{

    productsBox.innerHTML = `
    
    <p>Không có sản phẩm nào.</p>
    
    `;

}

/* TỔNG TIỀN */

document.getElementById("checkout-total")
.innerText =
"Tổng: " +
total.toLocaleString('vi-VN') +
"đ";

/* THANH TOÁN */

function payNow(){

    let name =
    document.getElementById("customer-name").value;

    let phone =
    document.getElementById("phone").value;

    let address =
    document.getElementById("address").value;

    let payment =
    document.getElementById("payment-method").value;

    if(
        name === "" ||
        phone === "" ||
        address === "" ||
        payment === ""
    ){

        alert(
        "Vui lòng nhập đầy đủ thông tin!"
        );

        return;

    }

    alert(
    "Thanh toán thành công!"
    );

    localStorage.removeItem("cart");

    localStorage.removeItem("checkoutCart");

    window.location.href =
    "index.html";

}

</script>

</body>

</html>
