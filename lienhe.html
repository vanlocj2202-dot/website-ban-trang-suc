<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Liên hệ</title>

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <!-- HEADER -->
    <header class="header">

        <div class="logo">

            <img src="images/hinh5.png">

            <span>Luxury Jewelry</span>

        </div>

        <nav class="menu">

            <ul>

                <li><a href="index.html">Trang chủ</a></li>

                <li><a href="trangsuc.html">Trang sức</a></li>

                <li><a href="nhancuoi.html">Nhẫn cưới</a></li>

                <li><a href="quatang.html">Quà tặng</a></li>

                <li><a href="bosuutap.html">Bộ sưu tập</a></li>

                <li><a href="lienhe.html">Liên hệ</a></li>

            </ul>

        </nav>

    </header>

    <!-- CONTACT -->
    <section class="contact">

        <h2>Liên Hệ Với Chúng Tôi</h2>

        <div class="contact-box">

            <input type="text"
                id="name"
                placeholder="Nhập họ tên">

            <input type="email"
                id="email"
                placeholder="Nhập email">

            <textarea id="message"
                placeholder="Nhập nội dung liên hệ"></textarea>

            <button onclick="sendContact()">
                Gửi liên hệ
            </button>

            <p id="success-message"></p>

        </div>

    </section>

    <!-- FOOTER -->
    <footer>

        <div class="footer-box">

            <h3>Luxury Jewelry</h3>

            <p>
                Trang sức cao cấp dành cho bạn
            </p>

        </div>

        <div class="footer-box">

            <h3>Thông tin liên hệ</h3>

            <p>
                Địa chỉ: 30/19 Bình Thới Q11
            </p>

            <p>
                Điện thoại: 090825901x
            </p>

            <p>
                Email: luxuryjewelry@gmail.com
            </p>

        </div>

    </footer>

    <script src="main.js"></script>

</body>

</html>
