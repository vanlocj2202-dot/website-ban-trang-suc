<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">

    <title>Bộ sưu tập</title>

    <link rel="stylesheet"
        href="style.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <header class="header">

        <div class="logo">

            <img src="images/hinh5.png">

            <span>Luxury Jewelry</span>

        </div>

        <nav class="menu">

            <ul>

<li><a href="index.html">Trang chủ</a></li>

                <li><a href="trangsuc.html">Trang sức</a></li>

                <li><a href="nhancuoi.html">Nhẫn cưới</a></li>

                <li><a href="quatang.html">Quà tặng</a></li>

                <li><a href="bosuutap.html">Bộ sưu tập</a></li>

                 <li><a href="lienhe.html">Liên Hệ</a></li>


            </ul>

        </nav>

    </header>

    <section class="products">

        <h2>Bộ sưu tập Luxury</h2>

        <div class="product-list">

            <div class="product">

                <img src="images/bst-dimond1.png">

                <h3>BST Hoàng Gia</h3>

                <p class="price">
                    100.000.000đ
                </p>

                <button
                    onclick="addToCart('BST Hoàng Gia',100000000)">
                    Thêm vào giỏ
                </button>

                <button
                    onclick="buyNow('BST Hoàng Gia',100000000)">
                    Mua ngay
                </button>

            </div>

            <div class="product">

                <img src="images/bst-dimond2.png">

                <h3>BST Diamond Queen</h3>

                <p class="price">
                    220.000.000đ
                </p>

                <button
                    onclick="addToCart('BST Diamond Queen',220000000)">
                    Thêm vào giỏ
                </button>

                <button
                    onclick="buyNow('BST Diamond Queen',220000000)">
                    Mua ngay
                </button>

            </div>

        </div>

    </section>

    <script src="main.js"></script>

</body>

</html>
